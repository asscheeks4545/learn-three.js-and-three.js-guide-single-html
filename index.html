          content: `
<h2>Procedural Noise</h2>
<p>Random numbers alone look like TV static. <strong>Noise</strong> (Perlin, Simplex, Value noise) produces smooth, organic randomness — the basis for clouds, terrain, wood grain, marble, and many natural textures.</p>

<h3>Value Noise in a Shader</h3>
<p>The simplest noise: hash integer coordinates to get a random value, then smoothly interpolate between neighboring hashes. The interpolation is what makes it "smooth" instead of pixelated.</p>

<h3>Fractal Brownian Motion (fBm)</h3>
<p>Stack multiple octaves of noise at increasing frequencies and decreasing amplitudes:</p>
<ul>
  <li><code>total = noise(p) + 0.5 * noise(2*p) + 0.25 * noise(4*p) + ...</code></li>
  <li>Each octave adds finer detail</li>
</ul>

<div class="info-box"><strong>Tip:</strong> Real Perlin/Simplex noise is more sophisticated, but value noise with fBm is good enough for most effects and the shader is much shorter.</div>

<h3>Try It</h3>
<p>A plane with a custom shader rendering procedural noise. The noise scrolls over time, creating a flowing cloud-like pattern. Brightness is mapped to a color gradient.</p>
`,
          code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);

// Hash + value noise + fBm in the fragment shader
const material = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uScale: { value: 3.0 }
  },
  vertexShader: \`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  \`,
  fragmentShader: \`
    uniform float uTime;
    uniform float uScale;
    varying vec2 vUv;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      // Smooth interpolation
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), u.x),
        mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x),
        u.y
      );
    }

    float fbm(vec2 p) {
      float total = 0.0;
      float amp = 0.5;
      for (int i = 0; i < 5; i++) {
        total += noise(p) * amp;
        p *= 2.0;
        amp *= 0.5;
      }
      return total;
    }

    void main() {
      vec2 p = vUv * uScale;
      float n = fbm(p + vec2(uTime * 0.1, uTime * 0.05));
      // Map to a color gradient
      vec3 deep = vec3(0.05, 0.1, 0.3);
      vec3 mid  = vec3(0.3, 0.5, 0.9);
      vec3 hot  = vec3(1.0, 0.8, 0.6);
      vec3 col = mix(deep, mid, smoothstep(0.3, 0.6, n));
      col = mix(col, hot, smoothstep(0.6, 0.85, n));
      gl_FragColor = vec4(col, 1.0);
    }
  \`
});

const plane = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2.5, 1, 1), material);
scene.add(plane);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  material.uniforms.uTime.value = clock.getElapsedTime();
  renderer.render(scene, camera);
}
animate();`

<h2>Drawing Curves</h2>
<p>The 2D canvas API has powerful curve methods for drawing smooth paths. Mastering them unlocks logos, illustrations, and any non-rectangular UI.</p>

<h3>The Three Curve Methods</h3>
<ul>
  <li><code>quadraticCurveTo(cpx, cpy, x, y)</code> — 1 control point, ends at (x,y)</li>
  <li><code>bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x, y)</code> — 2 control points</li>
  <li><code>arc(x, y, r, startAngle, endAngle)</code> — circular arc</li>
</ul>

<h3>Mental Model</h3>
<p>The control points "pull" the curve toward them but the curve doesn't pass through them. With 2 control points (bezier), you can create S-curves and complex shapes.</p>

<div class="info-box"><strong>Tip:</strong> Always call <code>ctx.beginPath()</code> before starting a new path, and <code>ctx.stroke()</code> or <code>ctx.fill()</code> to render it. Forgetting beginPath causes new paths to merge with old ones.</div>

<h3>Try It</h3>
<p>A wave drawn with quadratic curves — two animated control points make the wave flow. Below it, six filled bezier "petals" form a rotating flower.</p>
`,

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

let t = 0;
function draw() {
  t += 0.02;
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 1) Wavy line using quadraticCurveTo with animated control points
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 150);
  const segments = 10;
  for (let i = 0; i < segments; i++) {
    const x1 = (i / segments) * canvas.width;
    const x2 = ((i + 1) / segments) * canvas.width;
    const cx = (x1 + x2) / 2;
    const cy = 150 + Math.sin(t + i * 0.5) * 80;
    ctx.quadraticCurveTo(cx, cy, x2, 150);

  const cy = canvas.height / 2 + 80;
  const petalColors = ['#ff7a59', '#fbbf24', '#22c55e', '#60a5fa', '#a78bfa', '#ec4899'];

    const tipX = cx + Math.cos(angle) * 100;
    const tipY = cy + Math.sin(angle) * 100;
    const cp1X = cx + Math.cos(angle - 0.4) * 60;
    const cp1Y = cy + Math.sin(angle - 0.4) * 60;
    const cp2X = cx + Math.cos(angle + 0.4) * 60;
    const cp2Y = cy + Math.sin(angle + 0.4) * 60;

    ctx.fillStyle = petalColors[i];
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.bezierCurveTo(cp1X, cp1Y, cp2X, cp2Y, tipX, tipY);
    ctx.bezierCurveTo(cp2X, cp2Y, cp1X, cp1Y, cx, cy);
    ctx.fill();
  }

  // Center
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(cx, cy, 12, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(draw);
}
draw();`

          content: `
<h2>Per-Pixel Control</h2>
<p>The canvas 2D API lets you read and write individual pixels via <code>getImageData</code> and <code>putImageData</code>. This unlocks image filters, procedural textures, and effects impossible with the drawing primitives alone.</p>

<h3>The Pattern</h3>
<ul>
  <li><code>const img = ctx.getImageData(0, 0, w, h)</code> — read pixel buffer</li>
  <li><code>img.data</code> is a Uint8ClampedArray, 4 bytes per pixel (R, G, B, A)</li>
  <li>Modify the array in place</li>
  <li><code>ctx.putImageData(img, 0, 0)</code> — write back</li>
</ul>

<h3>Performance Warning</h3>
<p>Reading pixels back from the GPU is slow. For real-time effects, draw to an offscreen canvas, modify, then draw the offscreen to the main canvas. Or use WebGL shaders instead.</p>

<div class="info-box"><strong>Tip:</strong> <code>Uint8ClampedArray</code> automatically clamps values to 0-255, so you can do <code>data[i] = data[i] * 1.5</code> without worrying about overflow.</div>

<h3>Try It</h3>
<p>A procedural "plasma" effect. Every pixel's color is computed from sine functions of its position plus time. No drawing primitives used — just raw pixel writes.</p>
`,

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

// We'll render at a lower resolution for performance, then scale up
const W = 160, H = 90;
const off = document.createElement('canvas');
off.width = W; off.height = H;
const offctx = off.getContext('2d');
const img = offctx.createImageData(W, H);

let t = 0;
function draw() {
  t += 0.04;
  const data = img.data;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      // Plasma: combine multiple sine waves
      const v = Math.sin(x * 0.05 + t)
              + Math.sin(y * 0.05 + t * 1.3)
              + Math.sin((x + y) * 0.04 + t * 0.7)
              + Math.sin(Math.sqrt(x * x + y * y) * 0.03 - t * 2);
      // Map -4..4 to 0..1
      const n = (v + 4) / 8;
      data[i]     = Math.floor(128 + 128 * Math.sin(n * Math.PI * 2 + 0));       // R
      data[i + 1] = Math.floor(128 + 128 * Math.sin(n * Math.PI * 2 + 2.0));     // G
      data[i + 2] = Math.floor(128 + 128 * Math.sin(n * Math.PI * 2 + 4.0));     // B
      data[i + 3] = 255;                                                          // A
    }
  }
  offctx.putImageData(img, 0, 0);

  // Scale up to the main canvas with smoothing for a soft look
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(off, 0, 0, canvas.width, canvas.height);

  requestAnimationFrame(draw);
}
draw();`

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Interactive Course - Learn by Doing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 25% 28% 47%;
      grid-template-rows: 1fr;
      grid-template-areas: "lessons code preview";
      height: 100vh;
      gap: 1px;
      background: rgba(148, 163, 184, 0.1);
    }

    .lessons-panel { grid-area: lessons; }
    .code-panel { grid-area: code; }
    .preview-panel { grid-area: preview; }

    .panel {
      background: #0f172a;
      overflow-y: auto;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    }

    .panel:last-child {
      border-right: none;
    }

    /* Left Panel - Lessons */
    .lessons-panel {
      padding: 30px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .lessons-panel h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
    }

    .lesson-subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .lesson-meta {
      display: inline-block;
      margin-bottom: 22px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.12);
      color: #93c5fd;
      border: 1px solid rgba(96, 165, 250, 0.25);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .lesson-content {
      display: none;
    }

    .lesson-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .lesson-content h2 {
      font-size: 1.3rem;
      color: #60a5fa;
      margin: 20px 0 15px 0;
    }

    .lesson-content h3 {
      font-size: 1.1rem;
      color: #a78bfa;
      margin: 15px 0 10px 0;
    }

    .lesson-content p {
      margin-bottom: 12px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .lesson-content code {
      background: rgba(15, 23, 42, 0.8);
      color: #fbbf24;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: monospace;
    }

    .lesson-content ul {
      margin-left: 20px;
      margin-bottom: 12px;
    }

    .lesson-content li {
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    .lesson-content strong {
      color: #60a5fa;
      font-weight: 600;
    }

    .lesson-nav {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      padding-top: 20px;
    }

    .lesson-nav button {
      flex: 1;
      padding: 10px;
      background: rgba(96, 165, 250, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .lesson-nav button:hover {
      background: rgba(96, 165, 250, 0.2);
    }

    .lesson-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Middle Panel - Code */
    .code-panel {
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border-right: 1px solid rgba(148, 163, 184, 0.2);
    }

    .code-header {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      font-weight: 600;
      color: #60a5fa;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    #codeEditor {
      flex: 1;
      background: #1e293b;
      color: #e2e8f0;
      border: none;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      outline: none;
    }

    #codeEditor::placeholder {
      color: #475569;
    }

    .code-controls {
      padding: 15px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .code-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .code-btn-run {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      flex: 1;
    }

    .code-btn-run:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
    }

    .code-btn-reset {
      background: rgba(148, 163, 184, 0.1);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.2);
      flex: 0.8;
    }

    .code-btn-reset:hover {
      background: rgba(148, 163, 184, 0.2);
    }

    .code-btn-html {
      background: rgba(249, 115, 22, 0.1);
      color: #fb923c;
      border: 1px solid rgba(249, 115, 22, 0.3);
      flex: 0.8;
    }

    .code-btn-html:hover {
      background: rgba(249, 115, 22, 0.2);
    }
    .code-btn-save {
      background: rgba(99, 102, 241, 0.1);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.3);
      flex: 0.8;
    }
    .code-btn-save:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    /* Right Panel - Preview */
    .preview-panel {
      display: flex;
      flex-direction: column;
      background: #111827;
      position: relative;
    }

    .preview-header {
      background: rgba(30, 41, 59, 0.9);
      padding: 15px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      font-weight: 600;
      color: #60a5fa;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-status {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .preview-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #preview {
      flex: 1;
      border: none;
      background: #0f172a;
      min-height: 0;
    }

    /* Console Panel */
    .console-panel {
      display: flex;
      flex-direction: column;
      background: #0d1117;
      border-top: 2px solid rgba(148, 163, 184, 0.25);
      height: 200px;
      min-height: 32px;
      position: relative;
    }
    .console-panel.collapsed {
      height: 32px;
    }
    .console-resize-handle {
      position: absolute;
      top: -4px;
      left: 0;
      right: 0;
      height: 8px;
      cursor: ns-resize;
      z-index: 10;
    }
    .console-resize-handle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 3px;
      border-radius: 2px;
      background: rgba(148, 163, 184, 0.35);
      transition: background 0.15s ease;
    }
    .console-resize-handle:hover::after {
      background: rgba(96, 165, 250, 0.6);
    }
    .console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: rgba(30, 41, 59, 0.95);
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .console-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .console-header-left svg {
      width: 14px;
      height: 14px;
      fill: #94a3b8;
      transition: transform 0.2s ease;
    }
    .console-panel.collapsed .console-header-left svg {
      transform: rotate(-90deg);
    }
    .console-badge {
      background: #3b82f6;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      transition: background 0.2s ease;
    }
    .console-badge.has-warn { background: #f59e0b; }
    .console-badge.has-error { background: #ef4444; }
    .console-badge.hidden { display: none; }
    .console-clear-btn {
      background: none;
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #64748b;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s ease;
    }
    .console-clear-btn:hover {
      color: #e2e8f0;
      border-color: rgba(148, 163, 184, 0.4);
      background: rgba(148, 163, 184, 0.1);
    }
    /* Fullscreen button */
    .fullscreen-btn {
      background: none;
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: #94a3b8;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
      flex-shrink: 0;
    }
    .fullscreen-btn:hover {
      color: #e2e8f0;
      border-color: rgba(96, 165, 250, 0.5);
      background: rgba(96, 165, 250, 0.1);
    }
    .fullscreen-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
    /* Fullscreen overlay mode */
    .preview-panel.fullscreen-mode {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 9999 !important;
      grid-area: auto !important;
      border: none !important;
    }
    .console-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      font-family: 'Courier New', Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .console-panel.collapsed .console-body {
      display: none;
    }
    .console-entry {
      padding: 3px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.05);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      word-break: break-all;
    }
    .console-entry.log { color: #e2e8f0; }
    .console-entry.warn { color: #fbbf24; background: rgba(251, 191, 36, 0.06); }
    .console-entry.error { color: #fca5a5; background: rgba(239, 68, 68, 0.08); }
    .console-entry.info { color: #60a5fa; }
    .console-entry-icon {
      flex-shrink: 0;
      width: 16px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
    }
    .console-entry-text {
      flex: 1;
      white-space: pre-wrap;
    }

    .html-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .html-modal.active {
      display: flex;
    }

    .html-modal-content {
      background: #1e293b;
      border-radius: 10px;
      padding: 30px;
      width: 100%;
      max-width: 800px;
      max-height: 80vh;
      overflow: auto;
      color: #e2e8f0;
    }

    .html-modal-header {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #60a5fa;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding-bottom: 15px;
    }

    .html-modal pre {
      background: #0f172a;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 6px;
      padding: 15px;
      overflow-x: auto;
      font-size: 12px;
    }

    .html-modal code {
      color: #e2e8f0;
    }

    .html-modal-close {
      background: rgba(148, 163, 184, 0.1);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    .chapter-selector {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(56px, 1fr));
      gap: 6px;
      margin: 25px 0;
      padding: 15px 0;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .chapter-btn {
      padding: 8px 4px;
      background: rgba(96, 165, 250, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.2s ease;
      text-align: center;
      line-height: 1.2;
    }

    .chapter-btn:hover {
      background: rgba(96, 165, 250, 0.2);
      transform: translateY(-1px);
    }

    .chapter-btn.active {
      background: rgba(96, 165, 250, 0.3);
      border-color: rgba(96, 165, 250, 0.6);
      font-weight: 700;
    }

    /* The 2D bonus chapter gets an amber accent */
    .chapter-btn[data-chapter="13"] {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.25);
    }

    .chapter-btn[data-chapter="13"]:hover {
      background: rgba(251, 191, 36, 0.22);
    }

    .chapter-btn[data-chapter="13"].active {
      background: rgba(251, 191, 36, 0.3);
      border-color: rgba(251, 191, 36, 0.6);
    }

    .info-box {
      background: rgba(59, 130, 246, 0.1);
      border-left: 3px solid #3b82f6;
      padding: 12px;
      border-radius: 4px;
      margin: 15px 0;
      font-size: 0.9rem;
    }

    .info-box strong {
      color: #3b82f6;
    }

    /* Laptop / medium screens: lessons on left, code+preview stacked on right.
       All three panels remain visible — the preview is NEVER hidden. */
    @media (max-width: 1400px) {
      .container {
        grid-template-columns: 25% 75%;
        grid-template-rows: 1fr 1fr;
        grid-template-areas:
          "lessons code"
          "lessons preview";
      }
    }

    /* Mobile / narrow screens: stack all three panels vertically. */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr 1fr;
        grid-template-areas:
          "lessons"
          "code"
          "preview";
      }

      .panel {
        border-right: none;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      }

      .lessons-panel {
        max-height: 30vh;
      }

      .code-panel {
        max-height: 35vh;
      }

      .preview-panel {
        max-height: 35vh;
      }
    }

    .error-text {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
      font-size: 0.85rem;
    }

    .live-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      user-select: none;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(148, 163, 184, 0.05);
      transition: all 0.2s ease;
      font-weight: 600;
    }
    .live-toggle:hover { background: rgba(148, 163, 184, 0.12); }
    .live-toggle input {
      cursor: pointer;
      accent-color: #10b981;
      margin: 0;
      width: 14px;
      height: 14px;
    }
    .live-toggle.live-on {
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.45);
      background: rgba(16, 185, 129, 0.08);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
      transition: background 0.2s ease;
    }
    .live-toggle.live-on .live-dot {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.7);
      animation: livePulse 1.4s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Panel: Lessons -->
    <div class="panel lessons-panel">
      <h1>Three.js Mastery</h1>
      <div class="lesson-subtitle">Learn by writing code</div>
      <div class="lesson-meta" id="lessonMeta">Mode: 3D • Start a blank scene</div>

      <div class="chapter-selector" id="chapterSelector"></div>

      <div id="lessonsContainer"></div>
    </div>

    <!-- Middle Panel: Code Editor -->
    <div class="panel code-panel">
      <div class="code-header">✎ Write Your Code</div>
      <textarea id="codeEditor" placeholder="Edit code here..."></textarea>
      <div class="code-controls">
        <label class="live-toggle" id="livePreviewLabel">
          <input type="checkbox" id="livePreviewToggle" checked>
          <span class="live-dot"></span>Live
        </label>
        <button class="code-btn code-btn-run" onclick="runCode()">▶ Run Code</button>
        <button class="code-btn code-btn-reset" onclick="resetCode()">↻ Reset</button>
        <button class="code-btn code-btn-html" onclick="loadLessonExample()">📘 Load Example</button>
        <button class="code-btn code-btn-html" onclick="showFullHTML()">📄 Full HTML</button>
        <button class="code-btn code-btn-save" onclick="saveAsHTML()">💾 Save</button>
      </div>
    </div>

    <!-- Right Panel: Preview -->
    <div class="panel preview-panel">
      <div class="preview-header">
        Live Preview
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="preview-status" id="previewStatus">Ready</span>
          <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle Fullscreen">
            <svg viewBox="0 0 24 24" id="fsIconExpand"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
            <svg viewBox="0 0 24 24" id="fsIconShrink" style="display:none"><path d="M7 3H3v4h2V5h2V3zm14 0h-4v2h2v2h2V3zM3 17h2v2h2v2H3v-4zm14 2h-2v2h4v-4h-2v2z"/></svg>
          </button>
        </div>
      </div>
      <div class="preview-body">
        <iframe id="preview"></iframe>
        <div class="console-panel" id="consolePanel">
          <div class="console-resize-handle" id="consoleResizeHandle"></div>
          <div class="console-header" id="consoleHeader">
            <div class="console-header-left">
              <svg viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
              Console
              <span class="console-badge hidden" id="consoleBadge">0</span>
            </div>
            <button class="console-clear-btn" id="consoleClearBtn">Clear</button>
          </div>
          <div class="console-body" id="consoleBody"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HTML Modal -->
  <div class="html-modal" id="htmlModal">
    <div class="html-modal-content">
      <div class="html-modal-header">Full HTML Output</div>
      <pre><code id="htmlCode"></code></pre>
      <button class="html-modal-close" onclick="closeHTMLModal()">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // Lesson data
    const lessons = [
      {
        chapter: 1,
        title: `3D Basics: Your First Scene`,
        lessons: [
          {
            id: `1-1`,
            title: `Geometry First`,
            content: `
<h2>Start with geometry</h2>
<p>If you want to make 3D art in Three.js, the first thing you must learn is <strong>geometry</strong>. Geometry is the shape of your object. A cube, a sphere, a cone, a plane — these are all built-in shapes you can create in a few lines of code.</p>

<h3>What you are building</h3>
<p>This lesson creates one cube and puts it in the scene. That is the smallest meaningful 3D object: shape + material + position + render.</p>

<ul>
  <li><code>BoxGeometry</code> gives the cube its shape.</li>
  <li><code>MeshBasicMaterial</code> gives it a color.</li>
  <li><code>Mesh</code> combines shape and material into a visible object.</li>
  <li><code>scene.add()</code> places it into the 3D world.</li>
</ul>

<div class="info-box"><strong>Important:</strong> You do not need lights for this first example. The cube is visible because we are using a basic material. Later lessons will teach lighting, but first you must learn how shapes are made.</div>

<h3>Try it yourself</h3>
<p>Change the cube size, change the color, and move the cube to a different position. That is the fastest way to understand geometry.</p>
`,
            code: `// 1) Create a renderer so Three.js can draw to the page
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 2) Create the 3D world
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

// 3) Create a camera so we can look at the world

<h2>Make the same shape again and again</h2>
<p>A function is a tiny machine that builds something for you. In Three.js, functions are useful because you will often create the same kind of object many times: cubes, spheres, platforms, enemies, trees. Instead of copying the same block of code, you wrap it in a function.</p>

<h2>Animation is just repeated updates</h2>
<p>Once you can create a cube, the next step is making it move. In WebGL and Three.js, animation happens by repeatedly updating the object and then drawing the scene again. That loop is the heart of almost every interactive experience.</p>

<h3>What the loop does</h3>
<ul>
  <li><code>requestAnimationFrame(animate)</code> asks the browser for the next frame.</li>
  <li>You change the cube's rotation or position.</li>
  <li>You call <code>renderer.render()</code> so the new frame is displayed.</li>
</ul>

<div class="info-box"><strong>Why this matters:</strong> If you stop updating the object, it freezes. If you never render, it never appears. Animation is the combination of both.</div>

<h3>Try it</h3>
<p>Change the rotation speed, rotate around a different axis, or move the cube up and down instead of spinning.</p>

<h2>Moving Objects in 3D Space</h2>
<p>Every object in Three.js has three transformation properties. Together they describe where the object is, how it is oriented, and how big it is. Mastering these three properties is the foundation of all 3D scene composition.</p>

<h3>Position</h3>
<p><code>object.position</code> - where the object is in 3D space (x, y, z)</p>
<ul>
  <li><code>cube.position.x = 2</code> - move right</li>
  <li><code>cube.position.y = 1</code> - move up</li>
  <li><code>cube.position.z = -3</code> - move forward (away)</li>
</ul>

<h3>Rotation</h3>
<p><code>object.rotation</code> - how the object is oriented (in radians)</p>
<ul>
  <li><code>cube.rotation.x = Math.PI / 2</code> - rotate 90 degrees around X</li>
  <li>Use <code>Math.PI</code> for circular rotations (PI radians = 180 degrees)</li>
</ul>

<h3>Scale</h3>
<p><code>object.scale</code> - how big the object is, per axis</p>
<ul>
  <li><code>cube.scale.set(2, 1, 0.5)</code> - stretch differently along each axis</li>
</ul>
`,

<h2>Why Groups?</h2>
<p>A <code>THREE.Group</code> lets you parent multiple objects together. When you move, rotate, or scale the group, all children follow along. This is the foundation of the <strong>scene graph</strong> - a tree where child transforms are relative to their parent.</p>

<h3>Real-World Example</h3>
<p>Imagine a car: the body is the parent group, and each wheel is a child. When the car moves forward, all four wheels move with it automatically. You only need to spin each wheel around its own axle.</p>

<h3>How to Use Groups</h3>
<ul>
  <li><code>const group = new THREE.Group()</code> - create a group</li>
  <li><code>group.add(mesh)</code> - parent a mesh to the group</li>
  <li><code>scene.add(group)</code> - add the group to the scene</li>
</ul>

<div class="info-box"><strong>Try it:</strong> The example builds a 3-cube "solar system". The center is the sun, and two cubes orbit around it as planets, all parented to one rotating group.</div>
`,

const solarSystem = new THREE.Group();
scene.add(solarSystem);

// Sun (center)

  new THREE.SphereGeometry(0.8, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xfbbf24 })

<h2>Two Camera Types</h2>
<p>Three.js provides two main camera types. Choosing the right one drastically changes the look and feel of your scene.</p>

<h3>PerspectiveCamera</h3>
<p>Mimics human vision: objects farther away appear smaller. This is the most common choice for games, architectural walkthroughs, and any realistic 3D scene.</p>
<ul>
  <li><code>fov</code> - field of view in degrees (75 is typical)</li>
  <li><code>aspect</code> - width / height of viewport</li>
  <li><code>near</code>, <code>far</code> - clipping planes</li>
</ul>

<h3>OrthographicCamera</h3>
<p>Parallel projection: object size does not change with distance. Used for 2D-in-3D UIs, isometric games, CAD, and technical diagrams.</p>
<ul>
  <li>Defined by left, right, top, bottom, near, far</li>
  <li>Great for HUDs and minimaps</li>
</ul>

<div class="info-box"><strong>Try it:</strong> The example shows a perspective camera. Drag in the preview to orbit. Notice how the front face looks bigger than the back face - that is perspective in action.</div>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.background = new THREE.Color(0x0f172a);

// Perspective camera: mimics human vision
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(4, 3, 6);
camera.lookAt(0, 0, 0);

// Add a grid of cubes so we can see depth
const colors = [0x60a5fa, 0xa78bfa, 0x22c55e, 0xfbbf24, 0xff7a59, 0xec4899];
for (let x = -2; x <= 2; x++) {
  for (let z = -2; z <= 2; z++) {
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.8, 0.8),
      new THREE.MeshBasicMaterial({ color: colors[(x + z + 10) % colors.length] })
    );
    cube.position.set(x * 1.2, 0, z * 1.2);
    scene.add(cube);
  }
}

// OrbitControls for camera interaction

controls.enableDamping = true;

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();`

<h2>What OrbitControls Does</h2>
<p><code>OrbitControls</code> lets the user rotate, zoom, and pan the camera around a target point using the mouse. It is the most common way to make a Three.js scene interactive without writing custom input handling.</p>

<h3>Key Methods</h3>
<ul>
  <li><code>controls.enableDamping = true</code> - smooth inertia after release</li>
  <li><code>controls.dampingFactor = 0.05</code> - how much inertia</li>
  <li><code>controls.minDistance</code> / <code>controls.maxDistance</code> - zoom limits</li>
  <li><code>controls.autoRotate = true</code> - slow automatic rotation</li>

<h3>Try It</h3>
<p>Drag to orbit. Scroll to zoom. Right-drag to pan. The camera will keep following the target point at the origin.</p>

<h2>What is Geometry?</h2>
<p>A geometry describes the <strong>shape</strong> of an object - the vertices, edges, and faces that make up its surface. Three.js ships with many built-in geometries so you don't have to define points by hand.</p>

<h3>Common Built-in Geometries</h3>
<ul>
  <li><code>BoxGeometry(w, h, d)</code> - rectangular box</li>
  <li><code>SphereGeometry(r, w, h)</code> - sphere</li>
  <li><code>PlaneGeometry(w, h)</code> - flat 2D plane</li>
  <li><code>CylinderGeometry(rt, rb, h)</code> - cylinder or cone</li>
  <li><code>TorusGeometry(r, tube)</code> - donut</li>
  <li><code>ConeGeometry(r, h)</code> - cone</li>
</ul>

<div class="info-box"><strong>Tip:</strong> All geometry constructors take sizes in world units. A <code>BoxGeometry(1,1,1)</code> is 1x1x1 units, not 1 pixel.</div>

<h3>Try It</h3>
<p>The preview shows six common geometries arranged in a row. Each one is wrapped in a <code>MeshNormalMaterial</code> so you can see how the surface normals vary across each shape.</p>
`,

<h2>What is a Material?</h2>
<p>If geometry is the shape, the material is the <strong>surface appearance</strong> - color, shininess, texture, transparency. The material determines how light interacts with the object.</p>

<h3>Common Materials</h3>
<ul>
  <li><code>MeshBasicMaterial</code> - flat color, ignores light (always visible)</li>
  <li><code>MeshNormalMaterial</code> - color by surface direction</li>
  <li><code>MeshLambertMaterial</code> - diffuse only, fast, needs lights</li>
  <li><code>MeshPhongMaterial</code> - diffuse + specular highlights</li>
  <li><code>MeshStandardMaterial</code> - PBR, metalness + roughness</li>
  <li><code>MeshPhysicalMaterial</code> - even more advanced PBR</li>
</ul>

<div class="info-box"><strong>Rule of thumb:</strong> Use <code>MeshStandardMaterial</code> for realistic scenes, <code>MeshBasicMaterial</code> for unlit UI elements, and <code>MeshNormalMaterial</code> for debugging normals.</div>

<h3>Try It</h3>
<p>Four spheres with different materials. The first two don't react to light at all. The Lambert and Standard spheres need a light source - we added a directional light so you can see the difference.</p>
`,

renderer.setSize(window.innerWidth, window.innerHeight);

m2.position.x = -1; scene.add(m2);

const controls = new OrbitControls(camera, renderer.domElement);
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  [m1, m2, m3, m4].forEach(m => m.rotation.y = t);

<h2>Light Types in Three.js</h2>
<p>Lights determine how materials appear. Without lights, most materials render black. Choosing the right light type is essential for the mood and readability of your scene.</p>

<h3>Common Light Types</h3>
<ul>
  <li><code>AmbientLight</code> - uniform fill, no direction</li>
  <li><code>DirectionalLight</code> - parallel rays, like the sun</li>
  <li><code>PointLight</code> - radiates in all directions from a point</li>
  <li><code>SpotLight</code> - cone-shaped, with angle and penumbra</li>
  <li><code>HemisphereLight</code> - gradient between sky and ground colors</li>
</ul>

<div class="info-box"><strong>Tip:</strong> Always pair a key light (directional or spot) with a low ambient or hemisphere light. Pure black shadows look unrealistic; a soft fill makes scenes feel natural.</div>

<h3>Try It</h3>
<p>The scene has a dim ambient fill, a directional "sun" light, and a colored point light orbiting the spheres. Watch how the spheres' lit sides shift as the point light moves.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 8);

// Soft ambient fill
scene.add(new THREE.AmbientLight(0x404060, 0.6));

// Directional "sun"
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(3, 5, 2);
scene.add(sun);

// Orbiting point light
const point = new THREE.PointLight(0xff6b9d, 1.5, 15);
scene.add(point);

// Tiny sphere to visualize the point light position
const lightOrb = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xff6b9d })
);
scene.add(lightOrb);

// A row of standard-material spheres
const spheres = [];
for (let i = -3; i <= 3; i += 1.5) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.5 })
  );
  s.position.set(i, 0, 0);
  scene.add(s);
  spheres.push(s);
}

const controls = new OrbitControls(camera, renderer.domElement);
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  // Orbit the point light
  point.position.set(Math.cos(t) * 4, 2, Math.sin(t) * 4);
  lightOrb.position.copy(point.position);
  controls.update();
  renderer.render(scene, camera);
}

<h2>How Shadows Work</h2>
<p>Shadows are not automatic - you must enable them. Three.js uses <strong>shadow maps</strong>: the scene is rendered once from the light's point of view, and depth information is saved. Objects then sample this depth map to decide if they are in shadow.</p>

<h3>Three Steps to Enable Shadows</h3>
<ul>
  <li><code>renderer.shadowMap.enabled = true</code> - turn on the shadow system</li>
  <li><code>light.castShadow = true</code> - the light must cast</li>
  <li><code>mesh.castShadow = true</code> and <code>mesh.receiveShadow = true</code> - per object</li>
</ul>

<div class="info-box"><strong>Performance:</strong> Shadows roughly double the rendering cost for each shadow-casting light. Use them sparingly on mobile.</div>

<h3>Try It</h3>
<p>Three cubes above a flat ground plane. The directional light casts soft shadows of the cubes onto the ground. Drag to orbit and see the shadows from different angles.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(4, 4, 6);

// Shadow-casting directional light
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(4, 6, 3);
sun.castShadow = true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.left = -8;
sun.shadow.camera.right = 8;
sun.shadow.camera.top = 8;
sun.shadow.camera.bottom = -8;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x404060, 0.4));

// Ground that RECEIVES shadows
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x1e293b })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// Cubes that CAST shadows
const colors = [0x60a5fa, 0xff7a59, 0x22c55e];
colors.forEach((c, i) => {
  const cube = new THREE.Mesh(

  cube.castShadow = true;
  cube.receiveShadow = true;

});

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
function animate() {
  requestAnimationFrame(animate);
  controls.update();

}
animate();`

            title: `Delta Time & Clock`,
            content: `
<h2>Why Delta Time?</h2>
<p>If you rotate an object by <code>0.01</code> each frame, the speed depends on the frame rate. On a 144 Hz monitor the object spins 2.4x faster than on a 60 Hz monitor. Delta time fixes this by measuring the actual elapsed time between frames.</p>

<h3>Using THREE.Clock</h3>
<ul>
  <li><code>const clock = new THREE.Clock()</code></li>
  <li><code>const dt = clock.getDelta()</code> - seconds since last call</li>
  <li><code>const t = clock.getElapsedTime()</code> - total seconds since start</li>
</ul>

<div class="info-box"><strong>Formula:</strong> <code>position += speed * dt</code> gives consistent speed regardless of frame rate.</div>

<h3>Try It</h3>
<p>Two cubes. The left one rotates by a fixed amount per frame (frame-rate dependent). The right one uses delta time, so its rotation speed stays the same on any monitor.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 6);

// Frame-rate dependent (BAD)
const bad = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0xef4444 })
);
bad.position.x = -1.5; scene.add(bad);

// Frame-rate independent (GOOD)
const good = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x22c55e })
);
good.position.x = 1.5; scene.add(good);

scene.add(new THREE.AmbientLight(0x606080, 1));
const dl = new THREE.DirectionalLight(0xffffff, 1.5);
dl.position.set(2, 3, 2); scene.add(dl);

const clock = new THREE.Clock();
const speed = 1.0; // radians per second
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  // BAD: ignores dt
  bad.rotation.y += 0.02;

  // GOOD: uses dt - same speed on every monitor
  good.rotation.y += speed * dt;

  renderer.render(scene, camera);
}
animate();`

            id: `6-2`,
            title: `Keyboard & Mouse Input`,
            content: `
<h2>Handling Input</h2>
<p>Three.js does not include a built-in input system. You use the standard browser events: <code>keydown</code>, <code>keyup</code>, <code>mousemove</code>, <code>mousedown</code>, <code>mouseup</code>, and <code>wheel</code>.</p>

<h3>Keyboard Pattern</h3>
<p>Keep a <code>keys</code> object that records which keys are pressed. Update the scene each frame based on the keys held down - this is much smoother than reacting only on keydown events.</p>

<ul>
  <li><code>document.addEventListener('keydown', e => keys[e.key] = true)</code></li>
  <li><code>document.addEventListener('keyup', e => keys[e.key] = false)</code></li>
  <li>In <code>animate()</code>: <code>if (keys.w) cube.position.z -= speed * dt</code></li>
</ul>

<div class="info-box"><strong>Try it:</strong> Click the preview first to focus it. Then press W A S D to slide the cube around. The cube reacts smoothly because we read the keys object every frame.</div>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x606080, 1));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(2, 3, 2); scene.add(dl);

// Floor grid for spatial reference
const grid = new THREE.GridHelper(10, 10, 0x60a5fa, 0x334155);
scene.add(grid);

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(0.8, 0.8, 0.8),
  new THREE.MeshStandardMaterial({ color: 0x60a5fa })
);
cube.position.y = 0.4;
scene.add(cube);

// Track pressed keys
const keys = {};
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

const clock = new THREE.Clock();
const speed = 4; // units per second
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (keys['w']) cube.position.z -= speed * dt;
  if (keys['s']) cube.position.z += speed * dt;
  if (keys['a']) cube.position.x -= speed * dt;
  if (keys['d']) cube.position.x += speed * dt;
  cube.rotation.y += dt;
  renderer.render(scene, camera);
}
animate();`

            title: `Click to Pick`,
            content: `
<h2>What is Raycasting?</h2>
<p>A raycaster shoots an invisible ray from a point in a direction and reports which objects it hits. Combined with the mouse position, this lets you "click" 3D objects - the most common form of interaction in 3D web apps.</p>

<h3>Basic Pattern</h3>
<ul>
  <li><code>const raycaster = new THREE.Raycaster()</code></li>
  <li><code>const mouse = new THREE.Vector2()</code></li>
  <li>On click: convert mouse pixel coords to NDC (-1..1)</li>
  <li><code>raycaster.setFromCamera(mouse, camera)</code></li>
  <li><code>const hits = raycaster.intersectObjects(meshes)</code></li>
</ul>

<div class="info-box"><strong>Try it:</strong> Click any sphere in the preview. It randomly changes color. The raycaster figures out which sphere is under your cursor.</div>

<h3>Important</h3>
<p><code>intersectObjects</code> returns an array sorted by distance. The first item is the closest hit. Always check <code>hits.length > 0</code> before accessing <code>hits[0]</code>.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 8);

scene.add(new THREE.AmbientLight(0x606080, 1));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(2, 3, 2); scene.add(dl);

// Create a grid of clickable spheres
const spheres = [];
const palette = [0x60a5fa, 0xa78bfa, 0x22c55e, 0xfbbf24, 0xff7a59, 0xec4899];
for (let i = 0; i < 12; i++) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 32, 32),
    new THREE.MeshStandardMaterial({ color: palette[i % palette.length] })
  );
  const angle = (i / 12) * Math.PI * 2;
  s.position.set(Math.cos(angle) * 3, Math.sin(angle) * 3, 0);
  scene.add(s);
  spheres.push(s);
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(spheres);
  if (hits.length > 0) {
    const hit = hits[0].object;
    hit.material.color.setHex(palette[Math.floor(Math.random() * palette.length)]);
  }
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  spheres.forEach((s, i) => { s.position.z = Math.sin(t + i) * 0.5; });
  renderer.render(scene, camera);
}
animate();`

<h2>Hover Detection</h2>
<p>Using <code>pointermove</code> instead of <code>click</code>, you can detect what the cursor is hovering over. This is great for tooltips, cursor changes, and visual highlight feedback.</p>

<h3>Pattern</h3>
<ul>
  <li>On every pointer move, run the raycaster</li>
  <li>If a new object is hovered, unhighlight the old one and highlight the new</li>
  <li>Use <code>emissive</code> on Standard materials for a clean glow effect</li>
</ul>

<div class="info-box"><strong>Tip:</strong> For performance, throttle pointermove events or only raycast every other frame on heavy scenes.</div>

<h3>Try It</h3>
<p>Move your mouse over the cubes - they glow when hovered. The currently hovered cube gets a brighter emissive color.</p>
`,

<h2>Loading Textures</h2>
<p>Textures are image data wrapped around a 3D surface. Three.js uses the <code>TextureLoader</code> to load image files (PNG, JPG, etc.) and apply them as the surface color of a material.</p>

<h3>Quick Pattern</h3>
<ul>
  <li><code>const loader = new THREE.TextureLoader()</code></li>
  <li><code>const tex = loader.load('url.png')</code></li>
  <li><code>new THREE.MeshStandardMaterial({ map: tex })</code></li>
</ul>

<h3>Procedural Textures</h3>
<p>When you can't load external files (like in this sandboxed preview), you can paint a texture onto a <code>&lt;canvas&gt;</code> element and use it as a <code>CanvasTexture</code>. This is also great for dynamic, code-generated patterns.</p>

<div class="info-box"><strong>Try it:</strong> The example paints a colored grid onto a canvas and uses it as a texture on a rotating cube. No external image required.</div>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

scene.add(new THREE.AmbientLight(0x606080, 1));
const dl = new THREE.DirectionalLight(0xffffff, 1.5);
dl.position.set(2, 3, 2); scene.add(dl);

// Build a procedural texture on a canvas
const cvs = document.createElement('canvas');
cvs.width = 256; cvs.height = 256;
const ctx = cvs.getContext('2d');
const palette = ['#60a5fa', '#a78bfa', '#22c55e', '#fbbf24', '#ff7a59', '#ec4899'];
const cell = 256 / 4;
for (let y = 0; y < 4; y++) {
  for (let x = 0; x < 4; x++) {
    ctx.fillStyle = palette[(x + y) % palette.length];
    ctx.fillRect(x * cell, y * cell, cell, cell);
  }
}
// Add some text
ctx.fillStyle = 'white';
ctx.font = 'bold 24px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('THREE.JS', 128, 140);

const tex = new THREE.CanvasTexture(cvs);

const cube = new THREE.Mesh(

function animate() {
  requestAnimationFrame(animate);
  cube.rotation.y = clock.getElapsedTime() * 0.5;
  controls.update();
  renderer.render(scene, camera);
}
animate();`

<h2>Physically Based Rendering</h2>
<p><code>MeshStandardMaterial</code> uses PBR - the modern industry standard. Two parameters control most of the look:</p>

<h3>Key Parameters</h3>
<ul>
  <li><code>roughness</code> - how rough the surface is (0 = mirror, 1 = totally diffuse)</li>
  <li><code>metalness</code> - how metallic the surface is (0 = dielectric, 1 = pure metal)</li>
  <li><code>color</code> - the base albedo color</li>
</ul>

<h3>Mental Model</h3>
<p>Metals reflect their environment and have no diffuse color of their own. Non-metals (dielectrics) have a strong diffuse color and weaker reflections. <code>roughness</code> blurs the reflection.</p>

<div class="info-box"><strong>Try it:</strong> Four spheres with the same color but different roughness/metalness. Notice how the shiny metal sphere reflects the background while the matte one looks flat.</div>
`,

<h2>Adding Atmosphere with Fog</h2>
<p>Fog makes distant objects fade into the background color. It adds depth perception and hides the far clipping plane. Three.js has two fog types:</p>

<h3>Fog Types</h3>
<ul>
  <li><code>scene.fog = new THREE.Fog(color, near, far)</code> - linear fog</li>
  <li><code>scene.fog = new THREE.FogExp2(color, density)</code> - exponential fog (more realistic)</li>
</ul>

<div class="info-box"><strong>Tip:</strong> The fog color should match the scene background. Otherwise objects will fade to a different color than the horizon, looking jarring.</div>

<h3>Try It</h3>
<p>A grid of cubes stretching into the distance. The far cubes fade smoothly into the dark blue background thanks to exponential fog.</p>
`,

scene.add(new THREE.AmbientLight(0x606080, 0.7));

const palette = [0x60a5fa, 0xa78bfa, 0x22c55e, 0xfbbf24, 0xff7a59, 0xec4899];
// A long corridor of cubes
for (let z = 0; z > -40; z -= 2) {

            id: `9-2`,
            title: `Particle Systems`,
            content: `
<h2>Particles with Points</h2>
<p><code>THREE.Points</code> lets you render thousands of small sprites in a single draw call - perfect for rain, snow, sparks, stars, and dust. Each particle is defined by a position in a <code>BufferGeometry</code>.</p>

<h3>Building Blocks</h3>
<ul>
  <li><code>BufferGeometry</code> with a <code>position</code> attribute</li>
  <li><code>PointsMaterial</code> with size, color, and optional texture</li>
  <li><code>new THREE.Points(geometry, material)</code></li>
</ul>

<div class="info-box"><strong>Performance:</strong> Points are MUCH cheaper than rendering each particle as a separate Mesh. Use them whenever you need many small similar objects.</div>

<h3>Try It</h3>
<p>A swirling galaxy of 3000 particles. Each particle is a single point in space, animated on the CPU by modifying the geometry position attribute.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 8);

// Generate N particle positions in a swirling disc
const N = 3000;
const positions = new Float32Array(N * 3);
const colors = new Float32Array(N * 3);
const palette = [
  [0.4, 0.7, 1.0],
  [0.7, 0.5, 1.0],
  [1.0, 0.5, 0.7],
  [1.0, 0.9, 0.6],
];
for (let i = 0; i < N; i++) {
  const r = Math.random() * 4 + 0.5;
  const a = Math.random() * Math.PI * 2;
  const y = (Math.random() - 0.5) * 0.5;
  positions[i * 3 + 0] = Math.cos(a) * r;
  positions[i * 3 + 1] = y;
  positions[i * 3 + 2] = Math.sin(a) * r;
  const c = palette[Math.floor(Math.random() * palette.length)];
  colors[i * 3 + 0] = c[0];
  colors[i * 3 + 1] = c[1];
  colors[i * 3 + 2] = c[2];
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const mat = new THREE.PointsMaterial({
  size: 0.06,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const points = new THREE.Points(geo, mat);
scene.add(points);

const controls = new OrbitControls(camera, renderer.domElement);
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  points.rotation.y = t * 0.1;
  controls.update();
  renderer.render(scene, camera);
}
animate();`

<h2>Loading External Models</h2>
<p>In real projects, you import 3D models created in Blender, Maya, or other DCC tools. The most common format is <strong>glTF</strong> (.glb / .gltf). Three.js provides loaders via <code>GLTFLoader</code>.</p>

<h3>Typical Loader Pattern</h3>
<ul>
  <li><code>const loader = new GLTFLoader()</code></li>
  <li><code>loader.load('model.glb', (gltf) => { scene.add(gltf.scene) })</code></li>
  <li>Use a callback to add the loaded scene to your Three.js scene</li>
</ul>

<div class="info-box"><strong>Note:</strong> Sandboxed previews can't load external files. The example shows the next best thing - assembling a "model" out of primitives in a Group, ready to be replaced by a real loaded asset.</div>

<h3>Try It</h3>
<p>A simple "robot" built from boxes, cylinders, and a sphere. This is exactly how loaded models look internally - a Group containing many Mesh children.</p>

<h2>Animating Parts of a Model</h2>
<p>Once you have a model (loaded or built), you can animate its parts. For procedural animation, simply update child transforms each frame in your animation loop.</p>

<h3>Common Patterns</h3>
<ul>
  <li><strong>Bobbing:</strong> <code>model.position.y = Math.sin(t * 2) * 0.1</code></li>
  <li><strong>Walking legs:</strong> <code>leg.rotation.x = Math.sin(t * 6) * 0.5</code></li>
  <li><strong>Flapping wings:</strong> <code>wing.rotation.z = Math.sin(t * 8) * 0.7</code></li>
</ul>

<div class="info-box"><strong>For real skeletal animation:</strong> Loaded glTF files come with an <code>AnimationMixer</code>. You play clips via <code>mixer.clipAction(gltf.animations[0]).play()</code> and call <code>mixer.update(dt)</code> each frame.</div>

<h3>Try It</h3>
<p>A windmill with spinning blades. The blade group rotates around its Z axis while the tower stays still - exactly how you'd animate a real model's bones.</p>

            id: `11-1`,
            title: `Custom Shader Material`,
            content: `
<h2>What is a Shader?</h2>
<p>A shader is a small program that runs on the GPU. Three.js lets you write custom shaders with <code>ShaderMaterial</code>. The two key shader types are:</p>

<h3>Vertex Shader</h3>
<p>Runs once per vertex. Computes the final screen position of each vertex. Three.js gives you <code>position</code>, <code>uv</code>, and other attributes; you set <code>gl_Position</code>.</p>

<h3>Fragment Shader</h3>
<p>Runs once per pixel. Computes the final color of each pixel. Three.js gives you <code>vUv</code> (interpolated UV) and uniforms you define; you set <code>gl_FragColor</code>.</p>

<div class="info-box"><strong>Power tip:</strong> Custom shaders unlock effects impossible with built-in materials: ripples, glows, terrain, water, displacement, custom lighting models. But they require GLSL knowledge.</div>

<h3>Try It</h3>
<p>A plane with a custom shader that produces a flowing rainbow wave pattern. All colors are computed in the fragment shader using sine functions on the UV coordinates and time.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);

const uniforms = { uTime: { value: 0 } };

const material = new THREE.ShaderMaterial({
  uniforms,
  vertexShader: \`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  \`,
  fragmentShader: \`
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      vec2 p = vUv * 4.0;
      float r = 0.5 + 0.5 * sin(p.x + uTime);
      float g = 0.5 + 0.5 * sin(p.y + uTime * 1.3);
      float b = 0.5 + 0.5 * sin((p.x + p.y) + uTime * 0.7);
      gl_FragColor = vec4(r, g, b, 1.0);
    }
  \`
});

const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2, 1, 1), material);
scene.add(plane);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  uniforms.uTime.value = clock.getElapsedTime();
  renderer.render(scene, camera);
}
animate();`

            title: `Animated Vertex Displacement`,
            content: `
<h2>Moving Vertices in the Shader</h2>
<p>The vertex shader doesn't just compute position - it can also <em>change</em> it. This is called <strong>vertex displacement</strong>. It's how you make water waves, breathing characters, and animated terrain - all on the GPU with zero CPU cost.</p>

<h3>Pattern</h3>
<p>Take the original <code>position</code>, add an offset based on a sine wave, then multiply by the matrices:</p>
<ul>
  <li><code>float wave = sin(position.x * 4.0 + uTime * 2.0) * 0.15;</code></li>
  <li><code>vec3 newPos = position + vec3(0.0, wave, 0.0);</code></li>
  <li><code>gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);</code></li>
</ul>

<div class="info-box"><strong>Tip:</strong> Always displace along the vertex normal for organic effects. For a flat plane, the normal is (0,0,1) or (0,1,0) so direct displacement works fine.</div>

<h3>Try It</h3>
<p>A high-resolution plane whose vertices ripple like water. The geometry is static - the movement happens entirely in the GPU vertex shader.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2.5, 4);
camera.lookAt(0, 0, 0);

const uniforms = { uTime: { value: 0 } };

const material = new THREE.ShaderMaterial({
  uniforms,
  wireframe: false,
  vertexShader: [
    'uniform float uTime;',
    'varying float vHeight;',
    'varying vec2 vUv;',
    'void main() {',
    '  vUv = uv;',
    '  vec3 pos = position;',
    '  float wave = sin(pos.x * 2.0 + uTime * 2.0) * 0.2',
    '             + cos(pos.y * 2.5 + uTime * 1.5) * 0.15;',
    '  pos.z += wave;',
    '  vHeight = wave;',
    '  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);',
    '}'
  ].join('\n'),
  fragmentShader: [
    'varying float vHeight;',
    'varying vec2 vUv;',
    'void main() {',
    '  float t = 0.5 + 0.5 * vHeight;',
    '  vec3 deep = vec3(0.05, 0.1, 0.3);',
    '  vec3 crest = vec3(0.3, 0.7, 1.0);',
    '  vec3 col = mix(deep, crest, t);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n')
});

// High segment count so displacement looks smooth
const plane = new THREE.Mesh(new THREE.PlaneGeometry(5, 5, 80, 80), material);
plane.rotation.x = -Math.PI / 2;
scene.add(plane);

const controls = new OrbitControls(camera, renderer.domElement);
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  uniforms.uTime.value = clock.getElapsedTime();
  controls.update();
  renderer.render(scene, camera);
}
animate();`

          {
            id: `12-1`,
            title: `Instanced Mesh`,
            content: `
<h2>Why Instancing?</h2>
<p>Each <code>Mesh</code> you add is a separate draw call. Modern GPUs can handle a few thousand draw calls per frame - but if you want 10,000 trees, 50,000 grass blades, or 100,000 particles, you'll hit a CPU bottleneck long before the GPU breaks a sweat.</p>

<h3>The Solution: InstancedMesh</h3>
<p><code>InstancedMesh</code> renders the same geometry many times in a <strong>single draw call</strong>. You set a per-instance matrix to position, rotate, and scale each copy independently.</p>

<h3>Pattern</h3>
<ul>
  <li><code>const mesh = new THREE.InstancedMesh(geo, mat, COUNT)</code></li>
  <li><code>mesh.setMatrixAt(i, matrix)</code> - set transform of instance <code>i</code></li>
  <li><code>mesh.instanceMatrix.needsUpdate = true</code> - flag for upload</li>
</ul>

<div class="info-box"><strong>Benchmark:</strong> 1000 separate Meshes = 1000 draw calls. 1000 InstancedMesh instances = 1 draw call. Often 10-50x faster.</div>

<h3>Try It</h3>
<p>500 cubes arranged in a swirling dome. Despite the large count, the GPU handles them all in one draw call.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05080f);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 10);

scene.add(new THREE.AmbientLight(0x606080, 0.7));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(5, 10, 5); scene.add(dl);

const COUNT = 500;
const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
const mat = new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.4, metalness: 0.3 });
const instanced = new THREE.InstancedMesh(geo, mat, COUNT);

const dummy = new THREE.Object3D();
const color = new THREE.Color();
for (let i = 0; i < COUNT; i++) {
  // Position on a sphere
  const phi = Math.acos(1 - 2 * (i + 0.5) / COUNT);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  const r = 3;
  dummy.position.set(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
  dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
  dummy.updateMatrix();
  instanced.setMatrixAt(i, dummy.matrix);
  // Per-instance color
  color.setHSL(i / COUNT, 0.7, 0.6);
  instanced.setColorAt(i, color);
}
scene.add(instanced);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  instanced.rotation.y = clock.getElapsedTime() * 0.2;
  controls.update();
  renderer.render(scene, camera);
}
animate();`

          {
            id: `12-2`,
            title: `Pixel Ratio & Resize`,
            content: `
<h2>Performance Hygiene</h2>
<p>A few small habits keep your Three.js app fast across devices:</p>

<h3>Best Practices</h3>
<ul>
  <li><strong>Cap pixel ratio:</strong> <code>renderer.setPixelRatio(Math.min(devicePixelRatio, 2))</code>. Rendering at 3x on phones wastes 2.25x GPU time for invisible sharpness.</li>
  <li><strong>Dispose properly:</strong> Call <code>geometry.dispose()</code>, <code>material.dispose()</code>, <code>texture.dispose()</code> when removing objects, or you leak GPU memory.</li>
  <li><strong>Pause when hidden:</strong> Use <code>document.visibilitychange</code> to stop the animation loop when the tab is in the background.</li>
  <li><strong>Resize correctly:</strong> Update both <code>camera.aspect</code> + <code>camera.updateProjectionMatrix()</code> AND <code>renderer.setSize()</code> on window resize.</li>
</ul>

<div class="info-box"><strong>Tip:</strong> Wrap your <code>animate()</code> body in <code>if (document.hidden) return;</code> and re-schedule on visibility change. Battery life will thank you.</div>

<h3>Try It</h3>
<p>A simple scene with proper resize handling. Resize your browser window - the cube stays centered and correctly proportioned.</p>
`,
            code: `const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap at 2x
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

scene.add(new THREE.AmbientLight(0x606080, 1));
const dl = new THREE.DirectionalLight(0xffffff, 1.5);
dl.position.set(2, 3, 2); scene.add(dl);

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 1.5, 1.5),
  new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.4, metalness: 0.3 })
);
scene.add(cube);

// Proper resize handling
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

// Pause when tab is hidden
let running = true;
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  if (running) animate();
});

const clock = new THREE.Clock();
function animate() {
  if (!running) return;
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  cube.rotation.x = t * 0.5;
  cube.rotation.y = t * 0.7;
  renderer.render(scene, camera);
}
animate();`

        title: `2D Basics: Graphics with HTML5 Canvas`,
        lessons: [
          {
            id: `13-1`,
            title: `Canvas 2D Basics`,
            mode: `2d`,
            content: `
<h2>Why 2D first?</h2>
<p>Before you learn complex 3D scenes, it helps to understand the simpler 2D drawing model. The HTML5 Canvas 2D API is perfect for charts, diagrams, games, particle systems, and any graphic that lives on a flat plane. It teaches the same core ideas as 3D — state, loops, transforms, and drawing order — without the extra complexity of depth and perspective.</p>

<h3>Getting Started</h3>
<p>Create a <code>&lt;canvas&gt;</code> element and grab its 2D context:</p>
<ul>
  <li><code>const ctx = canvas.getContext('2d')</code></li>
  <li><code>ctx.fillStyle = 'red'; ctx.fillRect(x, y, w, h)</code></li>
  <li><code>ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill()</code></li>
</ul>

<h3>Coordinate System</h3>
<p>Origin (0, 0) is the <strong>top-left</strong> corner. Y increases downward - opposite of math class. Width and height come from <code>canvas.width</code> and <code>canvas.height</code>.</p>

<div class="info-box"><strong>Tip:</strong> Always set <code>canvas.width = window.innerWidth</code> in JS, NOT via CSS. CSS scaling stretches the bitmap and makes everything blurry.</div>

<h3>Try It</h3>
<p>A static scene with rectangles, circles, lines, and text - the four primitives you'll use 95% of the time.</p>
`,
            code: `const canvas = document.createElement('canvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

// Background
ctx.fillStyle = '#0f172a';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Rectangle
ctx.fillStyle = '#60a5fa';
ctx.fillRect(80, 80, 140, 90);

// Circle
ctx.fillStyle = '#ff7a59';
ctx.beginPath();
ctx.arc(360, 130, 50, 0, Math.PI * 2);
ctx.fill();

// Stroked triangle
ctx.strokeStyle = '#22c55e';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(500, 180);
ctx.lineTo(580, 60);
ctx.lineTo(660, 180);
ctx.closePath();
ctx.stroke();

// Line
ctx.strokeStyle = '#fbbf24';
ctx.lineWidth = 4;
ctx.beginPath();
ctx.moveTo(80, 280);
ctx.lineTo(720, 280);
ctx.stroke();

// Text
ctx.fillStyle = '#e2e8f0';
ctx.font = 'bold 32px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('2D Canvas Basics', canvas.width / 2, 360);

// Smaller text
ctx.fillStyle = '#94a3b8';
ctx.font = '16px sans-serif';
ctx.fillText('Rectangles, circles, lines, and text', canvas.width / 2, 390);`
          },
          {
            id: `13-2`,
            title: `2D Animation Loop`,
            mode: `2d`,
            content: `
<h2>From still images to motion</h2>
<p>Once you can draw shapes, the next step is motion. 2D Canvas uses the same <code>requestAnimationFrame</code> approach as Three.js, but the rules are simpler: update object state, clear the canvas, and draw again. This is the beginner-friendly way to learn how animation loops work before moving into 3D.</p>

<h3>Clearing the Canvas</h3>
<ul>
  <li><code>ctx.clearRect(0, 0, w, h)</code> - transparent clear</li>
  <li><code>ctx.fillRect(0, 0, w, h)</code> - solid color clear (faster, no alpha blending)</li>
</ul>

<h3>The Loop</h3>
<p>Same pattern as Three.js:</p>
<ul>
  <li>Compute <code>dt</code> (delta time) for frame-rate independence</li>
  <li>Update positions of every object</li>
  <li>Clear the canvas</li>
  <li>Redraw every object</li>
  <li>Call <code>requestAnimationFrame</code> again</li>
</ul>

<div class="info-box"><strong>Try it:</strong> Ten bouncing balls. Each one has a position and velocity. When it hits a wall, the velocity flips. Physics in 2D is much simpler than 3D - no Z axis to worry about.</div>
`,
            code: `const canvas = document.createElement('canvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

const colors = ['#60a5fa', '#a78bfa', '#22c55e', '#fbbf24', '#ff7a59', '#ec4899'];

// Create N balls with random positions and velocities
const balls = [];
for (let i = 0; i < 12; i++) {
  balls.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 200,
    vy: (Math.random() - 0.5) * 200,
    r: 15 + Math.random() * 25,
    c: colors[i % colors.length]
  });
}

let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  // Clear (solid color, fast)
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Update + draw each ball
  for (const b of balls) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    // Bounce off walls
    if (b.x < b.r) { b.x = b.r; b.vx *= -1; }
    if (b.x > canvas.width - b.r) { b.x = canvas.width - b.r; b.vx *= -1; }
    if (b.y < b.r) { b.y = b.r; b.vy *= -1; }
    if (b.y > canvas.height - b.r) { b.y = canvas.height - b.r; b.vy *= -1; }

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(loop);
}

<h2>From drawing to interaction</h2>
<p>Once a scene can move, the next step is making it respond to the user. Mouse interaction in 2D is simpler than 3D because you can compare the mouse position directly to your object positions. This is a natural bridge from static drawing into interactive apps and games.</p>

<h3>Hit Testing</h3>
<p>For a circle, the test is: "is the mouse within radius of the center?"</p>
<ul>
  <li><code>const dx = mouse.x - circle.x</code></li>
  <li><code>const dy = mouse.y - circle.y</code></li>
  <li><code>const dist = Math.sqrt(dx*dx + dy*dy)</code></li>
  <li>If <code>dist &lt; circle.r</code>, the mouse is inside</li>
</ul>

<h3>Particles Following the Mouse</h3>
<p>A classic effect: spawn particles at the cursor, let them drift and fade. This combines everything you've learned - canvas drawing, animation loop, mouse events, and per-object state.</p>

<div class="info-box"><strong>Tip:</strong> Remember to remove dead particles from the array, or your list grows forever and slows down. Use <code>filter()</code> or swap-and-pop.</div>

<h3>Try It</h3>
<p>Move your mouse over the canvas. A trail of glowing particles spawns at the cursor and fades away. The particles drift outward with random velocities for an organic feel.</p>
`,
            code: `const canvas = document.createElement('canvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

const colors = ['#60a5fa', '#a78bfa', '#22c55e', '#fbbf24', '#ff7a59', '#ec4899'];

// Particle pool
const particles = [];

// Mouse state
const mouse = { x: canvas.width / 2, y: canvas.height / 2, active: false };
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
  // Spawn 3-5 particles per move
  for (let i = 0; i < 4; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 120;
    particles.push({
      x: mouse.x,
      y: mouse.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      size: 4 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });

let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  // Trail effect: paint a semi-transparent black rectangle instead of clearing
  ctx.fillStyle = 'rgba(15, 23, 42, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Use additive blending for a glow
  ctx.globalCompositeOperation = 'lighter';

  // Update + draw particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt * 0.8;

    if (p.life > 0) {
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  // Remove dead particles
  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // Cursor halo
  if (mouse.active) {
    ctx.strokeStyle = 'rgba(96, 165, 250, 0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 16, 0, Math.PI * 2);
    ctx.stroke();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);`

<h2>Programmatic Camera Moves</h2>
<p>Sometimes you want the camera to fly to a specific position — a "cinematic" cut, a focus on an object the user clicked, or a guided tour. The trick is to <strong>tween</strong> the camera's position and lookAt target smoothly over time.</p>

<h3>The Lerp Pattern</h3>
<p><code>Vector3.lerp(target, t)</code> moves a vector a fraction <code>t</code> (0..1) toward the target. By increasing <code>t</code> each frame, you get smooth motion:</p>
<ul>
  <li><code>camera.position.lerp(targetPos, 0.05)</code> — move 5% toward target each frame</li>
  <li>Smaller <code>t</code> = slower, more easing</li>
  <li>Or use <code>Vector3.lerpVectors(a, b, alpha)</code> with explicit alpha</li>
</ul>

<h3>Quadratic Ease-Out</h3>
<p>For a more cinematic feel, use an easing function: <code>const ease = 1 - Math.pow(1 - progress, 3)</code>. This starts fast and slows down near the target.</p>

<div class="info-box"><strong>Try it:</strong> The camera cycles through 5 preset viewpoints, smoothly flying to each one. Click in the preview to advance to the next viewpoint immediately.</div>

  { pos: [-5, 1, 3], look: [0, 0, 0] },
  { pos: [0, 6, 0.1],look: [0, 0, 0] },
  { pos: [3, 0.5, -5],look: [0, 0, 0] },

<h2>Building Geometry From Scratch</h2>
<p>Built-in geometries cover most cases, but sometimes you need a custom shape — a procedural terrain, a generated building, a custom UI mesh. <code>BufferGeometry</code> lets you define vertices directly.</p>

<h3>The Three Attributes</h3>
<p>Every visible mesh needs at minimum:</p>
<ul>
  <li><strong>position</strong> — vec3 per vertex (where the vertex is)</li>
  <li><strong>normal</strong> — vec3 per vertex (which way the surface faces, for lighting)</li>
  <li><strong>uv</strong> — vec2 per vertex (texture coordinates, optional for untextured)</li>
</ul>

<h3>Building a Triangle</h3>
<p>A triangle = 3 vertices. Each vertex has position (3 floats) and normal (3 floats). The data goes into a <code>Float32Array</code> wrapped in a <code>BufferAttribute</code>.</p>

<div class="info-box"><strong>Tip:</strong> Three.js uses counter-clockwise winding for front faces. If your triangle is invisible from one side, you may have the vertices in clockwise order — either flip them or set <code>side: THREE.DoubleSide</code> on the material.</div>

<h3>Try It</h3>
<p>A custom pyramid built from 4 side triangles plus a 2-triangle square base. All geometry is defined by hand, no built-in shapes used. The face normal is computed with a cross product.</p>
`,

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(2, 2, 3);

scene.add(new THREE.AmbientLight(0x606080, 0.7));
const dl = new THREE.DirectionalLight(0xffffff, 1.3);
dl.position.set(2, 4, 1); scene.add(dl);

function makePyramid() {
  const geo = new THREE.BufferGeometry();
  const apex = [0, 1.4, 0];
  const b1 = [-1, 0, 1], b2 = [1, 0, 1], b3 = [1, 0, -1], b4 = [-1, 0, -1];
  const positions = [];
  const normals = [];
  const sides = [[apex, b1, b2], [apex, b2, b3], [apex, b3, b4], [apex, b4, b1]];
  for (const [a, b, c] of sides) {
    positions.push(...a, ...b, ...c);
    const u = new THREE.Vector3().fromArray(b).sub(new THREE.Vector3().fromArray(a));
    const v = new THREE.Vector3().fromArray(c).sub(new THREE.Vector3().fromArray(a));
    const n = new THREE.Vector3().crossVectors(u, v).normalize();
    normals.push(n.x, n.y, n.z, n.x, n.y, n.z, n.x, n.y, n.z);
  }
  // Base (2 triangles, facing down)
  positions.push(...b1, ...b3, ...b2);
  normals.push(0, -1, 0, 0, -1, 0, 0, -1, 0);
  positions.push(...b1, ...b4, ...b3);
  normals.push(0, -1, 0, 0, -1, 0, 0, -1, 0);

  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  return geo;
}

<h2>Spring Motion</h2>
<p>Realistic motion needs physics. The simplest useful model is a <strong>spring</strong>: an object accelerates toward a target, with damping to slow it down. This is the math behind UI animations, camera follow, and "bouncy" effects.</p>

<h3>The Equation</h3>
<p>Each frame:</p>
<ul>
  <li><code>force = (target - position) * stiffness</code> — pull toward target</li>
  <li><code>velocity = (velocity + force * dt) * damping</code> — apply force, then damp</li>
  <li><code>position += velocity * dt</code> — move</li>
</ul>

<h3>Tuning</h3>
<ul>
  <li><code>stiffness</code> = 50: snappy, fast snap</li>
  <li><code>stiffness</code> = 10: slow, soft follow</li>
  <li><code>damping</code> = 0.85: slight overshoot</li>
  <li><code>damping</code> = 0.5: heavy, no overshoot (critically damped)</li>
</ul>

<div class="info-box"><strong>Tip:</strong> Spring physics is exactly how iOS / Material Design do their "smooth" UI animations. Same math, different domain.</div>

<h3>Try It</h3>
<p>A cube springs toward the mouse cursor (projected onto a plane). Move your mouse over the preview — the cube chases it with a natural springy delay.</p>

<h3>Steps</h3>
<ul>
  <li><code>pointerdown</code>: raycast to find clicked object; if hit, store it as <code>selected</code> and create the drag plane</li>
  <li><code>pointermove</code>: if selected, raycast against the drag plane, move selected to intersection</li>
  <li><code>pointerup</code>: clear selected</li>
</ul>

<p>The simplest 3D collision test is <strong>axis-aligned bounding box</strong> (AABB). Every mesh can be wrapped in an invisible box, and we check if two boxes overlap. Fast, simple, good enough for most games.</p>
